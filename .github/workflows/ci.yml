# Runs on every push and PR to main — typecheck, ESLint, production build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          # Build does not need real API keys; middleware may read env at build time
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SITE_NAME: MMBS Groep
